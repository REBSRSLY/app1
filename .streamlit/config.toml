# Notion/Spotify-inspired dark theme: layered near-black surfaces and a bold
# single accent (Spotify), clean sans-serif type and thin borders (Notion).

[theme]
base = "dark"

backgroundColor = "#0d0d0f"
secondaryBackgroundColor = "#181818"
textColor = "#f2f2f2"
primaryColor = "#c0392b"
borderColor = "#2a2a2a"
linkColor = "#c0392b"

font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
headingFont = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap"
baseFontSize = 15
baseFontWeight = 400
headingFontWeights = [700, 700, 600, 600, 600, 600]
linkUnderline = false

baseRadius = "large"
buttonRadius = "full"
showWidgetBorder = true
showSidebarBorder = true

[theme.sidebar]
backgroundColor = "#050505"
secondaryBackgroundColor = "#141414"
textColor = "#f2f2f2"
borderColor = "#2a2a2a"
primaryColor = "#c0392b"
